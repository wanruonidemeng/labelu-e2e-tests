name: LabelU UI Regression

on: [push, pull_request]

jobs:
  ui-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 和教程一致

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install labelu pytest pytest-playwright pyyaml requests
          playwright install chromium

      - name: Run UI Tests
        run: |
          pytest tests/ --browser chromium --tracing on --video on

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
