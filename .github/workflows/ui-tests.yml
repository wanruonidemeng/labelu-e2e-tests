name: LabelU UI Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          python-version: "3.11"
          auto-activate-base: false

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda create -n labelu-env python=3.11 -y
          conda activate labelu-env
          pip install labelu pytest pytest-playwright requests
          playwright install chromium

      - name: Start LabelU and run tests
        shell: bash -l {0}
        run: |
          conda activate labelu-env
          # 启动服务（后台）
          nohup labelu start --port 8000 > labelu.log 2>&1 &
          # 等待就绪
          for i in {1..60}; do
            if curl -s http://localhost:8000/docs | grep -q Swagger; then
              echo "✅ Ready"; break
            fi
            sleep 1
          done
          # 运行测试（此时 LabelU 已由 CI 启动）
          pytest tests/ --browser chromium --tracing on --video on -v
