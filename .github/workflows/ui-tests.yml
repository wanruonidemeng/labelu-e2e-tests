name: LabelU UI Tests (Conda)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  ui-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          python-version: "3.11"
          activate-environment: labelu-env
          auto-activate-base: false
          add-pip-as-python-module: true

      - name: Create and activate Conda environment
        shell: bash -l {0}
        run: |
          conda create -n labelu-env python=3.11 -y
          conda activate labelu-env
          python -m pip install --upgrade pip

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda activate labelu-env
          pip install labelu pytest pytest-playwright pyyaml requests
          playwright install chromium

      - name: Start LabelU and run tests
        shell: bash -l {0}
        run: |
          conda activate labelu-env

          # 启动 LabelU 服务（后台）
          start /B labelu start --port 8000 > nul 2>&1

          # 等待服务就绪（使用单行 Python 脚本）
          python -c "
import time, requests, sys;
print('Waiting for LabelU to start...');
for i in range(60):
    try:
        r = requests.get('http://localhost:8000/docs', timeout=1);
        if r.status_code == 200 and 'Swagger' in r.text:
            print('✅ LabelU is ready!');
            sys.exit(0)
    except:
        pass
    time.sleep(1)
    print(f'⏳ Waiting... ({i+1}/60)')
print('❌ LabelU failed to start');
sys.exit(1)
"

          # 运行测试
          pytest tests/ --browser chromium --tracing on --video on -v

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
